---
layout: null
---
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H5TCFVG1E7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-H5TCFVG1E7');
  </script>
  <title>ブログ | ワンクリIPO</title>
  <meta name="description" content="IPO投資の知識・当選確率を上げるコツ・ツール活用法などをお届けします。">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #4F46E5;
      --primary-light: #6366F1;
      --accent: #7C3AED;
      --text: #1E293B;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --border: rgba(0,0,0,0.08);
      --border-light: rgba(0,0,0,0.1);
      --font-sans: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      font-family: var(--font-sans);
      background: #fff;
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    .blog-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
    }
    .blog-header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .blog-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }
    .blog-nav { display: flex; gap: 20px; font-size: 14px; }
    .blog-nav a { color: var(--text-secondary); font-weight: 500; }
    .blog-nav a:hover { color: var(--text); }
    .blog-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .blog-title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 40px;
    }
    .post-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .post-card {
      display: block;
      padding: 28px;
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: 16px;
      transition: all 0.3s ease;
    }
    .post-card:hover {
      border-color: rgba(79, 70, 229, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .post-card-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .post-card-tag {
      display: inline-block;
      padding: 2px 10px;
      background: rgba(79, 70, 229, 0.08);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      color: var(--primary-light);
    }
    .post-card-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .post-card-excerpt {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .blog-footer {
      background: #F1F5F9;
      padding: 32px 0;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .blog-footer p { font-size: 13px; color: var(--text-muted); }
    .blog-footer a { color: var(--text-muted); }
    .blog-footer a:hover { color: var(--primary-light); }
  </style>
</head>
<body>
  <header class="blog-header">
    <div class="blog-header-inner">
      <a href="/" class="blog-logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="url(#lg)"/><path d="M6 22L12 16L16 19L26 9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 9H26V14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="lg" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#4F46E5"/><stop offset="1" stop-color="#7C3AED"/></linearGradient></defs></svg>
        ワンクリIPO
      </a>
      <nav class="blog-nav">
        <a href="/">トップ</a>
        <a href="/blog/">ブログ</a>
        <a href="/#pricing">料金</a>
      </nav>
    </div>
  </header>

  <div class="blog-container">
    <h1 class="blog-title">ブログ</h1>
    <div class="post-list">
      {% for post in site.posts %}
      <a href="{{ post.url }}" class="post-card">
        <div class="post-card-meta">
          <time>{{ post.date | date: "%Y年%m月%d日" }}</time>
          {% if post.tags %}<span class="post-card-tag">{{ post.tags | first }}</span>{% endif %}
        </div>
        <h2 class="post-card-title">{{ post.title }}</h2>
        <p class="post-card-excerpt">{{ post.excerpt | strip_html | truncate: 120 }}</p>
      </a>
      {% endfor %}
    </div>
  </div>

  <footer class="blog-footer">
    <p>&copy; 2026 ワンクリIPO / <a href="/">トップページ</a></p>
  </footer>
</body>
</html>
