<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | ワンクリIPO ブログ</title>
  <meta name="description" content="{{ page.description | default: page.excerpt | strip_html | truncate: 160 }}">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description | default: page.excerpt | strip_html | truncate: 160 }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="ワンクリIPO ブログ">
  <meta property="og:locale" content="ja_JP">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #4F46E5;
      --primary-light: #6366F1;
      --accent: #7C3AED;
      --text: #1E293B;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --border: rgba(0,0,0,0.08);
      --border-light: rgba(0,0,0,0.1);
      --font-sans: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: #fff;
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--primary-light); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    .blog-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
    }
    .blog-header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .blog-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
    }
    .blog-logo:hover { text-decoration: none; }
    .blog-nav { display: flex; gap: 20px; font-size: 14px; }
    .blog-nav a { color: var(--text-secondary); font-weight: 500; }
    .blog-nav a:hover { color: var(--text); text-decoration: none; }

    /* Article */
    .article-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .article-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .article-tag {
      display: inline-block;
      padding: 2px 10px;
      background: rgba(79, 70, 229, 0.08);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary-light);
    }
    .article-title {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 32px;
    }
    .article-body {
      font-size: 16px;
      line-height: 2;
      color: var(--text);
    }
    .article-body h2 {
      font-size: 24px;
      font-weight: 800;
      margin: 48px 0 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(79, 70, 229, 0.15);
    }
    .article-body h3 {
      font-size: 20px;
      font-weight: 700;
      margin: 32px 0 12px;
    }
    .article-body p {
      margin-bottom: 20px;
    }
    .article-body ul, .article-body ol {
      margin-bottom: 20px;
      padding-left: 24px;
    }
    .article-body li {
      margin-bottom: 8px;
    }
    .article-body strong {
      color: var(--text);
      font-weight: 700;
    }
    .article-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .article-body th, .article-body td {
      padding: 12px 16px;
      border: 1px solid var(--border-light);
      text-align: left;
    }
    .article-body th {
      background: rgba(0,0,0,0.02);
      font-weight: 600;
    }
    .article-body img {
      max-width: 100%;
      border-radius: 12px;
      margin: 24px 0;
    }
    .article-body blockquote {
      border-left: 4px solid var(--primary);
      padding: 16px 20px;
      margin: 24px 0;
      background: rgba(79, 70, 229, 0.04);
      border-radius: 0 8px 8px 0;
      color: var(--text-secondary);
    }

    /* CTA box */
    .article-cta {
      margin: 48px 0;
      padding: 32px;
      background: linear-gradient(135deg, rgba(79,70,229,0.06), rgba(124,58,237,0.06));
      border: 1px solid rgba(79, 70, 229, 0.15);
      border-radius: 16px;
      text-align: center;
    }
    .article-cta h3 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .article-cta p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .article-cta .cta-btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
    }
    .article-cta .cta-btn:hover { text-decoration: none; opacity: 0.9; }

    /* Footer */
    .blog-footer {
      background: #F1F5F9;
      padding: 32px 0;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .blog-footer p {
      font-size: 13px;
      color: var(--text-muted);
    }
    .blog-footer a { color: var(--text-muted); }
    .blog-footer a:hover { color: var(--primary-light); }

    @media (max-width: 600px) {
      .article-title { font-size: 24px; }
      .article-body h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <header class="blog-header">
    <div class="blog-header-inner">
      <a href="/" class="blog-logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="url(#lg)"/><path d="M6 22L12 16L16 19L26 9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 9H26V14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="lg" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#4F46E5"/><stop offset="1" stop-color="#7C3AED"/></linearGradient></defs></svg>
        ワンクリIPO
      </a>
      <nav class="blog-nav">
        <a href="/">トップ</a>
        <a href="/blog/">ブログ</a>
        <a href="/#pricing">料金</a>
      </nav>
    </div>
  </header>

  <article class="article-container">
    <div class="article-meta">
      <time>{{ page.date | date: "%Y年%m月%d日" }}</time>
      {% if page.tags %}<span class="article-tag">{{ page.tags | first }}</span>{% endif %}
    </div>
    <h1 class="article-title">{{ page.title }}</h1>
    <div class="article-body">
      {{ content }}

      <div class="article-cta">
        <h3>IPO申し込みをもっとラクに</h3>
        <p>複数証券会社への申し込みをワンクリックで完了。1ヶ月間フル機能を無料で体験できます。</p>
        <a href="/#pricing" class="cta-btn">無料で試してみる</a>
      </div>
    </div>
  </article>

  <footer class="blog-footer">
    <p>&copy; 2026 ワンクリIPO / <a href="/">トップページ</a></p>
  </footer>
</body>
</html>
